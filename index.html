<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zack Leo · 作品集</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0b1120;
            --bg-card: rgba(255, 255, 255, 0.04);
            --text-primary: #f1f5f9;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.3);
            --accent: #60a5fa;
            --border-color: rgba(255, 255, 255, 0.06);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(96, 165, 250, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(168, 85, 247, 0.06), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 960px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: 32px;
        }

        .lang-btn {
            padding: 5px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 30px;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .lang-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #0b1120;
            font-weight: 600;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo-text {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f1f5f9, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .badge-portfolio {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(96, 165, 250, 0.12);
            border: 1px solid rgba(96, 165, 250, 0.15);
            color: var(--accent);
            backdrop-filter: blur(4px);
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
        }

        .social-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 16px;
            text-decoration: none;
            transition: var(--transition);
        }

        .social-icon:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #0b1120;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(96, 165, 250, 0.25);
        }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .project-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px 28px;
            transition: var(--transition);
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .project-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.04), transparent 60%);
            opacity: 0;
            transition: var(--transition);
        }

        .project-card:hover {
            border-color: rgba(96, 165, 250, 0.2);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card .icon-box {
            font-size: 34px;
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .project-card .info {
            flex: 1;
            min-width: 0;
        }

        .project-card .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .project-card .desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .project-card .tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .project-card .tags span {
            padding: 1px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .project-card .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 6px;
        }

        .status-online {
            background: rgba(34, 197, 94, 0.12);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.15);
        }

        .status-dev {
            background: rgba(251, 191, 36, 0.10);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.12);
        }

        .status-coming {
            background: rgba(168, 85, 247, 0.10);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.12);
        }

        .project-card .arrow {
            font-size: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: var(--transition);
        }

        .project-card:hover .arrow {
            color: var(--accent);
            transform: translateX(4px);
        }

        .project-card.disabled {
            opacity: 0.5;
            cursor: default;
        }

        .project-card.disabled:hover {
            transform: none;
            box-shadow: none;
            border-color: var(--border-color);
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.8;
            border-top: 1px solid var(--border-color);
            padding-top: 28px;
        }

        .footer .heart {
            color: #f87171;
            display: inline-block;
            animation: heartbeat 1.8s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color var(--transition);
        }

        .footer a:hover {
            color: var(--text-secondary);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 4px;
        }

        @media (max-width: 640px) {
            .project-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 20px;
                gap: 12px;
            }

            .project-card .icon-box {
                width: 48px;
                height: 48px;
                font-size: 26px;
            }

            .project-card .arrow {
                align-self: flex-end;
            }

            .logo-text {
                font-size: 30px;
            }

            .lang-bar {
                justify-content: center;
            }
        }

        @media (max-width: 400px) {
            .project-card {
                padding: 16px;
            }
            .project-card .title {
                font-size: 16px;
            }
        }

        /* ===== 外链标签 ===== */
        .external-link-badge {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: 8px;
            border: 1px solid var(--border-color);
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- 语言切换 -->
        <div class="lang-bar">
            <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
            <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
        </div>

        <!-- 头部 -->
        <header class="header">
            <div class="logo-text">Zack Leo</div>
            <span class="badge-portfolio" data-zh="✦ 作品集 · 持续更新" data-en="✦ Portfolio · Always Evolving">
                ✦ 作品集 · 持续更新
            </span>
            <div class="social-row">
                <a href="https://github.com/leo-jan" target="_blank" class="social-icon" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="#" class="social-icon" title="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="mailto:leo.jan@example.com" class="social-icon" title="Email">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </header>

        <!-- 作品列表 -->
        <div class="projects">

            <!-- ============================================================
            作品 1：施工日报系统 ✅ 已更新链接
            ============================================================ -->
            <a href="https://teamomiao.streamlit.app/" class="project-card" target="_blank" rel="noopener noreferrer">
                <div class="icon-box">🏗️</div>
                <div class="info">
                    <div class="title">
                        <span data-zh="施工日报填报系统" data-en="Civil Work Daily Report">
                            施工日报填报系统
                        </span>
                        <span class="external-link-badge">🔗</span>
                    </div>
                    <div class="desc" data-zh="多用户并发录入 · 实时数据汇总 · 考勤管理 · Python + Streamlit"
                         data-en="Multi‑user entry · Real‑time summary · Attendance · Python + Streamlit">
                        多用户并发录入 · 实时数据汇总 · 考勤管理 · Python + Streamlit
                    </div>
                    <div class="tags">
                        <span>Python</span>
                        <span>Streamlit</span>
                        <span>Pandas</span>
                        <span>并发</span>
                    </div>
                    <span class="status-badge status-online" data-zh="● 在线" data-en="● Online">● 在线</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <!-- ============================================================
            作品 2：数据可视化仪表板（开发中）
            ============================================================ -->
            <div class="project-card disabled">
                <div class="icon-box">📊</div>
                <div class="info">
                    <div class="title" data-zh="数据可视化仪表板" data-en="Data Visualization Dashboard">
                        数据可视化仪表板
                    </div>
                    <div class="desc" data-zh="交互式图表 · 实时数据监控 · Plotly + Dash"
                         data-en="Interactive charts · Real‑time monitoring · Plotly + Dash">
                        交互式图表 · 实时数据监控 · Plotly + Dash
                    </div>
                    <div class="tags">
                        <span>Python</span>
                        <span>Plotly</span>
                        <span>Dash</span>
                    </div>
                    <span class="status-badge status-dev" data-zh="● 开发中" data-en="● In Development">● 开发中</span>
                </div>
                <span class="arrow" style="opacity:0.3;">→</span>
            </div>

            <!-- ============================================================
            作品 3：更多作品即将上线
            ============================================================ -->
            <div class="project-card disabled">
                <div class="icon-box">📝</div>
                <div class="info">
                    <div class="title" data-zh="更多作品即将上线" data-en="More Projects Coming Soon">
                        更多作品即将上线
                    </div>
                    <div class="desc" data-zh="持续开发中，敬请期待..." data-en="Under development, stay tuned...">
                        持续开发中，敬请期待...
                    </div>
                    <span class="status-badge status-coming" data-zh="● 规划中" data-en="● Planning">● 规划中</span>
                </div>
                <span class="arrow" style="opacity:0.3;">→</span>
            </div>

        </div>

        <!-- 底部 -->
        <footer class="footer">
            <p>
                <span data-zh="© 2026 Zack Leo · 用" data-en="© 2026 Zack Leo · Made with">
                    © 2026 Zack Leo · 用
                </span>
                <span class="heart">❤</span>
                <span data-zh="打造" data-en="Built">打造</span>
            </p>
            <div class="footer-links">
                <a href="https://github.com/leo-jan" target="_blank">GitHub</a>
                <span>·</span>
                <a href="mailto:leo.jan@example.com">Email</a>
                <span>·</span>
                <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
                    <span data-zh="返回顶部" data-en="Back to Top">返回顶部</span>
                </a>
            </div>
        </footer>

    </div>

    <script>
        let currentLang = 'zh';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            document.querySelectorAll('[data-zh][data-en]').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            document.title = lang === 'zh' ? 'Zack Leo · 作品集' : 'Zack Leo · Portfolio';
            localStorage.setItem('preferred_lang', lang);
        }

        const saved = localStorage.getItem('preferred_lang');
        if (saved === 'zh' || saved === 'en') {
            setLang(saved);
        }

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'l' || e.key === 'L') && !e.ctrlKey && !e.metaKey) {
                setLang(currentLang === 'zh' ? 'en' : 'zh');
                e.preventDefault();
            }
        });

        console.log('🚀 fateglance.cn 已加载！');
        console.log('💡 按 L 键快速切换中英文');
        console.log('📊 日报系统: https://teamomiao.streamlit.app/');
    </script>

</body>
</html>
