<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fateful Glance</title>
    <link rel="icon" href="https://s3.bmp.ovh/2026/07/01/5nyGYdOG.png" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1a2e;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #eef3fc;
            --text-secondary: rgba(180, 210, 240, 0.8);
            --text-muted: rgba(180, 210, 240, 0.4);
            --accent: #5b8def;
            --accent-light: #8ab4ff;
            --accent-glow: rgba(91, 141, 239, 0.2);
            --border-color: rgba(91, 141, 239, 0.15);
            --shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(91, 141, 239, 0.10), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(91, 141, 239, 0.06), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 960px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: 32px;
        }

        .lang-btn {
            padding: 5px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 30px;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .lang-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #0f1a2e;
            font-weight: 600;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo-text {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .logo-sub {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 3px;
            font-weight: 300;
            margin-top: -2px;
            opacity: 0.5;
        }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .project-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px 28px;
            transition: var(--transition);
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .project-card:hover {
            border-color: rgba(91, 141, 239, 0.25);
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4), 0 0 40px rgba(91, 141, 239, 0.06);
        }

        .project-card .icon-box {
            font-size: 30px;
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(91, 141, 239, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(91, 141, 239, 0.10);
        }

        .project-card .info {
            flex: 1;
            min-width: 0;
        }

        .project-card .title {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .project-card .title .ext-link {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(91, 141, 239, 0.08);
            padding: 1px 10px;
            border-radius: 12px;
            margin-left: 8px;
            border: 1px solid rgba(91, 141, 239, 0.08);
        }

        .project-card .desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .project-card .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 6px;
        }

        .status-online {
            background: rgba(74, 200, 140, 0.12);
            color: #64d4a0;
            border: 1px solid rgba(74, 200, 140, 0.10);
        }

        .status-dev {
            background: rgba(255, 200, 80, 0.08);
            color: #e8c86a;
            border: 1px solid rgba(255, 200, 80, 0.08);
        }

        .status-coming {
            background: rgba(91, 141, 239, 0.08);
            color: var(--accent-light);
            border: 1px solid rgba(91, 141, 239, 0.08);
        }

        .status-new {
            background: rgba(91, 141, 239, 0.15);
            color: #8ab4ff;
            border: 1px solid rgba(91, 141, 239, 0.15);
        }

        .project-card .arrow {
            font-size: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: var(--transition);
        }

        .project-card:hover .arrow {
            color: var(--accent-light);
            transform: translateX(4px);
        }

        .project-card.disabled {
            opacity: 0.5;
            cursor: default;
        }

        .project-card.disabled:hover {
            transform: none;
            box-shadow: var(--shadow);
            border-color: var(--border-color);
        }

        .project-card.disabled:hover .arrow {
            color: var(--text-muted);
            transform: none;
        }

        .entry-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            color: var(--text-muted);
            font-size: 13px;
            border-top: 1px solid var(--border-color);
            padding-top: 28px;
        }

        .footer .heart {
            color: #5b8def;
            display: inline-block;
            animation: heartbeat 1.8s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @media (max-width: 640px) {
            .project-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 20px;
                gap: 12px;
            }
            .project-card .icon-box {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
            .project-card .arrow {
                align-self: flex-end;
            }
            .logo-text {
                font-size: 28px;
            }
            .lang-bar {
                justify-content: center;
            }
        }

        @media (max-width: 400px) {
            .project-card {
                padding: 16px;
            }
            .project-card .title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="lang-bar">
            <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
            <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
        </div>

        <header class="header">
            <div class="logo-text">Fateful Glance</div>
            <div class="logo-sub">✦ fateglance.cn ✦</div>
        </header>

        <div class="projects">

            <!-- ============================================================
            施工日报系统 - 双入口
            ============================================================ -->
            <div class="entry-group">

                <!-- 入口1 -->
                <a href="https://teamomiao.streamlit.app/" class="project-card" target="_blank" rel="noopener noreferrer">
                    <div class="icon-box">📋</div>
                    <div class="info">
                        <div class="title">
                            <span data-zh="施工日报填报系统" data-en="Daily Report">
                                施工日报填报系统
                            </span>
                            <span class="ext-link">🔗</span>
                        </div>
                        <div class="desc" data-zh="支持多用户并发录入、实时数据汇总与考勤管理"
                             data-en="Multi‑user entry, real‑time summary, and attendance management">
                            支持多用户并发录入、实时数据汇总与考勤管理
                        </div>
                        <span class="status-badge status-online" data-zh="● 在线" data-en="● Online">● 在线</span>
                    </div>
                    <span class="arrow">→</span>
                </a>

                <!-- 入口2：重构版 -->
                <a href="https://daily-report-three-black.vercel.app/" class="project-card" target="_blank" rel="noopener noreferrer">
                    <div class="icon-box">🚀</div>
                    <div class="info">
                        <div class="title">
                            <span data-zh="施工日报填报系统（重构版）" data-en="Daily Report (Refactored)">
                                施工日报填报系统（重构版）
                            </span>
                            <span class="ext-link">🔗</span>
                        </div>
                        <div class="desc" data-zh="重构版 · 性能优化，加载更快"
                             data-en="Refactored · Optimized for faster loading">
                            重构版 · 性能优化，加载更快
                        </div>
                        <span class="status-badge status-new" data-zh="● 新版" data-en="● New">● 新版</span>
                    </div>
                    <span class="arrow">→</span>
                </a>

            </div>

            <!-- ============================================================
            数据可视化仪表板（开发中）
            ============================================================ -->
            <div class="project-card disabled">
                <div class="icon-box">📈</div>
                <div class="info">
                    <div class="title" data-zh="数据可视化仪表板" data-en="Data Visualization Dashboard">
                        数据可视化仪表板
                    </div>
                    <div class="desc" data-zh="交互式图表与实时数据监控"
                         data-en="Interactive charts and real‑time monitoring">
                        交互式图表与实时数据监控
                    </div>
                    <span class="status-badge status-dev" data-zh="● 开发中" data-en="● In Development">● 开发中</span>
                </div>
                <span class="arrow">→</span>
            </div>

            <!-- ============================================================
            更多作品
            ============================================================ -->
            <div class="project-card disabled">
                <div class="icon-box">📝</div>
                <div class="info">
                    <div class="title" data-zh="更多作品即将上线" data-en="More Projects Coming Soon">
                        更多作品即将上线
                    </div>
                    <div class="desc" data-zh="持续开发中，敬请期待..."
                         data-en="Under development, stay tuned...">
                        持续开发中，敬请期待...
                    </div>
                    <span class="status-badge status-coming" data-zh="● 规划中" data-en="● Planning">● 规划中</span>
                </div>
                <span class="arrow">→</span>
            </div>

        </div>

        <!-- 底部 -->
        <footer class="footer">
            <p>
                <span data-zh="© 2026 Zack Leo ❤️ Kepler Miao" data-en="© 2026 Zack Leo ❤️ Kepler Miao">
                    © 2026 Zack Leo ❤️ Kepler Miao
                </span>
            </p>
        </footer>

    </div>

    <script>
        let currentLang = 'zh';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            document.querySelectorAll('[data-zh][data-en]').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            localStorage.setItem('preferred_lang', lang);
        }

        const saved = localStorage.getItem('preferred_lang');
        if (saved === 'zh' || saved === 'en') {
            setLang(saved);
        }

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'l' || e.key === 'L') && !e.ctrlKey && !e.metaKey) {
                setLang(currentLang === 'zh' ? 'en' : 'zh');
                e.preventDefault();
            }
        });

        console.log('🚀 fateglance.cn 已加载！');
        console.log('💡 按 L 键快速切换中英文');
    </script>

</body>
</html>
