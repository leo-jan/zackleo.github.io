<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zack Leo · 作品集</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f0f7ff;
            --bg-card: #ffffff;
            --text-primary: #1a237e;
            --text-secondary: #546e7a;
            --text-muted: #90a4ae;
            --accent: #4a90d9;
            --border-color: #d5dce6;
            --shadow: 0 8px 32px rgba(74, 144, 217, 0.10);
            --radius: 16px;
            --transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .container {
            max-width: 960px;
            width: 100%;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 语言切换 ===== */
        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: 32px;
        }

        .lang-btn {
            padding: 5px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 30px;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .lang-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
            font-weight: 600;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo-text {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .badge-portfolio {
            display: inline-block;
            margin-top: 4px;
            padding: 4px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(74, 144, 217, 0.10);
            border: 1px solid rgba(74, 144, 217, 0.15);
            color: var(--accent);
        }

        /* ===== 社交链接 ===== */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        .social-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 16px;
            text-decoration: none;
            transition: var(--transition);
        }

        .social-icon:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(74, 144, 217, 0.25);
        }

        /* ===== 作品卡片 ===== */
        .projects {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px 28px;
            transition: var(--transition);
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(74, 144, 217, 0.15);
        }

        .project-card .icon-box {
            font-size: 34px;
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(74, 144, 217, 0.06);
            border-radius: 12px;
            border: 1px solid rgba(74, 144, 217, 0.08);
        }

        .project-card .info {
            flex: 1;
            min-width: 0;
        }

        .project-card .title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 0;
        }

        .project-card .title .ext-link {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(74, 144, 217, 0.08);
            padding: 1px 10px;
            border-radius: 12px;
            margin-left: 8px;
            border: 1px solid rgba(74, 144, 217, 0.10);
        }

        /* ⚠️ 移除描述和标签，只保留标题 + 状态 */

        .project-card .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 6px;
        }

        .status-online {
            background: rgba(46, 125, 50, 0.10);
            color: #2e7d32;
            border: 1px solid rgba(46, 125, 50, 0.12);
        }

        .status-dev {
            background: rgba(237, 108, 2, 0.10);
            color: #e65100;
            border: 1px solid rgba(237, 108, 2, 0.10);
        }

        .status-coming {
            background: rgba(106, 27, 154, 0.08);
            color: #6a1b9a;
            border: 1px solid rgba(106, 27, 154, 0.10);
        }

        .project-card .arrow {
            font-size: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: var(--transition);
        }

        .project-card:hover .arrow {
            color: var(--accent);
            transform: translateX(4px);
        }

        .project-card.disabled {
            opacity: 0.6;
            cursor: default;
        }

        .project-card.disabled:hover {
            transform: none;
            box-shadow: var(--shadow);
            border-color: var(--border-color);
        }

        .project-card.disabled:hover .arrow {
            color: var(--text-muted);
            transform: none;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            margin-top: 48px;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.8;
            border-top: 1px solid var(--border-color);
            padding-top: 28px;
        }

        .footer .heart {
            color: #e74c3c;
            display: inline-block;
            animation: heartbeat 1.8s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color var(--transition);
        }

        .footer a:hover {
            color: var(--text-secondary);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 4px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .project-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 20px;
                gap: 12px;
            }

            .project-card .icon-box {
                width: 48px;
                height: 48px;
                font-size: 26px;
            }

            .project-card .arrow {
                align-self: flex-end;
            }

            .logo-text {
                font-size: 30px;
            }

            .lang-bar {
                justify-content: center;
            }
        }

        @media (max-width: 400px) {
            .project-card {
                padding: 16px;
            }
            .project-card .title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- 语言切换 -->
        <div class="lang-bar">
            <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
            <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
        </div>

        <!-- 头部 -->
        <header class="header">
            <div class="logo-text">Zack Leo</div>
            <span class="badge-portfolio" data-zh="✦ 作品集 · 持续更新" data-en="✦ Portfolio · Always Evolving">
                ✦ 作品集 · 持续更新
            </span>
            <div class="social-row">
                <a href="https://github.com/leo-jan" target="_blank" class="social-icon" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="#" class="social-icon" title="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="mailto:leo.jan@example.com" class="social-icon" title="Email">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </header>

        <!-- 作品列表 -->
        <div class="projects">

            <!-- ===== 作品 1：施工日报系统 ===== -->
            <a href="https://teamomiao.streamlit.app/" class="project-card" target="_blank" rel="noopener noreferrer">
                <div class="icon-box">🏗️</div>
                <div class="info">
                    <div class="title">
                        <span data-zh="施工日报填报系统" data-en="Civil Work Daily Report">
                            施工日报填报系统
                        </span>
                        <span class="ext-link">🔗</span>
                    </div>
                    <span class="status-badge status-online" data-zh="● 在线" data-en="● Online">● 在线</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <!-- ===== 作品 2：数据可视化仪表板 ===== -->
            <div class="project-card disabled">
                <div class="icon-box">📊</div>
                <div class="info">
                    <div class="title" data-zh="数据可视化仪表板" data-en="Data Visualization Dashboard">
                        数据可视化仪表板
                    </div>
                    <span class="status-badge status-dev" data-zh="● 开发中" data-en="● In Development">● 开发中</span>
                </div>
                <span class="arrow">→</span>
            </div>

            <!-- ===== 作品 3：更多作品 ===== -->
            <div class="project-card disabled">
                <div class="icon-box">📝</div>
                <div class="info">
                    <div class="title" data-zh="更多作品即将上线" data-en="More Projects Coming Soon">
                        更多作品即将上线
                    </div>
                    <span class="status-badge status-coming" data-zh="● 规划中" data-en="● Planning">● 规划中</span>
                </div>
                <span class="arrow">→</span>
            </div>

        </div>

        <!-- 底部 -->
        <footer class="footer">
            <p>
                <span data-zh="© 2026 Zack Leo · 用" data-en="© 2026 Zack Leo · Made with">
                    © 2026 Zack Leo · 用
                </span>
                <span class="heart">❤</span>
                <span data-zh="打造" data-en="Built">打造</span>
            </p>
            <div class="footer-links">
                <a href="https://github.com/leo-jan" target="_blank">GitHub</a>
                <span>·</span>
                <a href="mailto:leo.jan@example.com">Email</a>
                <span>·</span>
                <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
                    <span data-zh="返回顶部" data-en="Back to Top">返回顶部</span>
                </a>
            </div>
        </footer>

    </div>

    <script>
        let currentLang = 'zh';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            document.querySelectorAll('[data-zh][data-en]').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            document.title = lang === 'zh' ? 'Zack Leo · 作品集' : 'Zack Leo · Portfolio';
            localStorage.setItem('preferred_lang', lang);
        }

        const saved = localStorage.getItem('preferred_lang');
        if (saved === 'zh' || saved === 'en') {
            setLang(saved);
        }

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'l' || e.key === 'L') && !e.ctrlKey && !e.metaKey) {
                setLang(currentLang === 'zh' ? 'en' : 'zh');
                e.preventDefault();
            }
        });

        console.log('🚀 fateglance.cn 已加载！');
        console.log('💡 按 L 键快速切换中英文');
        console.log('📊 日报系统: https://teamomiao.streamlit.app/');
    </script>

</body>
</html>
