<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zack Leo · 作品集</title>
    <!-- ✅ 您的自定义图标 -->
    <link rel="icon" href="https://s3.bmp.ovh/2026/07/01/5nyGYdOG.png" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ===== 您原有的全部样式保持不变 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a2332;
            --bg-card: rgba(255, 255, 255, 0.06);
            --text-primary: #f0ece4;
            --text-secondary: rgba(240, 236, 228, 0.7);
            --text-muted: rgba(240, 236, 228, 0.35);
            --accent: #d4a853;
            --accent-hover: #e8c97a;
            --border-color: rgba(255, 255, 255, 0.06);
            --shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .container {
            max-width: 960px;
            width: 100%;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 语言切换 ===== */
        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: 32px;
        }

        .lang-btn {
            padding: 5px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 30px;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .lang-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #1a2332;
            font-weight: 600;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo-text {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .badge-portfolio {
            display: inline-block;
            margin-top: 4px;
            padding: 4px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(212, 168, 83, 0.12);
            border: 1px solid rgba(212, 168, 83, 0.15);
            color: var(--accent);
        }

        /* ===== 社交链接 ===== */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        .social-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 16px;
            text-decoration: none;
            transition: var(--transition);
        }

        .social-icon:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #1a2332;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(212, 168, 83, 0.25);
        }

        /* ===== 作品卡片 ===== */
        .projects {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .project-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px 28px;
            transition: var(--transition);
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .project-card:hover {
            border-color: rgba(212, 168, 83, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
        }

        .project-card .icon-box {
            font-size: 30px;
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .project-card .info {
            flex: 1;
            min-width: 0;
        }

        .project-card .title {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .project-card .title .ext-link {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 1px 10px;
            border-radius: 12px;
            margin-left: 8px;
            border: 1px solid var(--border-color);
        }

        .project-card .desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .project-card .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 6px;
        }

        .status-online {
            background: rgba(76, 175, 80, 0.12);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.12);
        }

        .status-dev {
            background: rgba(255, 193, 7, 0.10);
            color: #ffd54f;
            border: 1px solid rgba(255, 193, 7, 0.10);
        }

        .status-coming {
            background: rgba(212, 168, 83, 0.10);
            color: var(--accent);
            border: 1px solid rgba(212, 168, 83, 0.10);
        }

        .project-card .arrow {
            font-size: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: var(--transition);
        }

        .project-card:hover .arrow {
            color: var(--accent);
            transform: translateX(4px);
        }

        .project-card.disabled {
            opacity: 0.5;
            cursor: default;
        }

        .project-card.disabled:hover {
            transform: none;
            box-shadow: var(--shadow);
            border-color: var(--border-color);
        }

        .project-card.disabled:hover .arrow {
            color: var(--text-muted);
            transform: none;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            margin-top: 48px;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.8;
            border-top: 1px solid var(--border-color);
            padding-top: 28px;
        }

        .footer .heart {
            color: #e57373;
            display: inline-block;
            animation: heartbeat 1.8s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color var(--transition);
        }

        .footer a:hover {
            color: var(--text-secondary);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 4px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .project-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 20px;
                gap: 12px;
            }
            .project-card .icon-box {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
            .project-card .arrow {
                align-self: flex-end;
            }
            .logo-text {
                font-size: 28px;
            }
            .lang-bar {
                justify-content: center;
            }
        }

        @media (max-width: 400px) {
            .project-card {
                padding: 16px;
            }
            .project-card .title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- 语言切换 -->
        <div class="lang-bar">
            <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
            <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
        </div>

        <!-- 头部 -->
        <header class="header">
            <div class="logo-text">Zack Leo</div>
            <span class="badge-portfolio" data-zh="✦ 作品集 · 持续更新" data-en="✦ Portfolio · Always Evolving">
                ✦ 作品集 · 持续更新
            </span>
            <div class="social-row">
                <a href="https://github.com/leo-jan" target="_blank" class="social-icon" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="#" class="social-icon" title="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="mailto:291698522@qq.com" class="social-icon" title="Email">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </header>

        <!-- 作品列表 -->
        <div class="projects">

            <!-- 作品 1：施工日报系统 -->
            <a href="https://teamomiao.streamlit.app/" class="project-card" target="_blank" rel="noopener noreferrer">
                <div class="icon-box">📋</div>
                <div class="info">
                    <div class="title">
                        <span data-zh="施工日报填报系统" data-en="Civil Work Daily Report">
                            施工日报填报系统
                        </span>
                        <span class="ext-link">🔗</span>
                    </div>
                    <div class="desc" data-zh="支持多用户并发录入、实时数据汇总与考勤管理"
                         data-en="Multi‑user entry, real‑time summary, and attendance management">
                        支持多用户并发录入、实时数据汇总与考勤管理
                    </div>
                    <span class="status-badge status-online" data-zh="● 在线" data-en="● Online">● 在线</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <!-- 作品 2：数据可视化仪表板 -->
            <div class="project-card disabled">
                <div class="icon-box">📈</div>
                <div class="info">
                    <div class="title" data-zh="数据可视化仪表板" data-en="Data Visualization Dashboard">
                        数据可视化仪表板
                    </div>
                    <div class="desc" data-zh="交互式图表与实时数据监控"
                         data-en="Interactive charts and real‑time monitoring">
                        交互式图表与实时数据监控
                    </div>
                    <span class="status-badge status-dev" data-zh="● 开发中" data-en="● In Development">● 开发中</span>
                </div>
                <span class="arrow">→</span>
            </div>

            <!-- 作品 3：更多作品 -->
            <div class="project-card disabled">
                <div class="icon-box">📝</div>
                <div class="info">
                    <div class="title" data-zh="更多作品即将上线" data-en="More Projects Coming Soon">
                        更多作品即将上线
                    </div>
                    <div class="desc" data-zh="持续开发中，敬请期待..."
                         data-en="Under development, stay tuned...">
                        持续开发中，敬请期待...
                    </div>
                    <span class="status-badge status-coming" data-zh="● 规划中" data-en="● Planning">● 规划中</span>
                </div>
                <span class="arrow">→</span>
            </div>

        </div>

        <!-- 底部 -->
        <footer class="footer">
            <p>
                <span data-zh="© 2026 Zack Leo · 业余独立设计" data-en="© 2026 Zack Leo · Independent Design">
                    © 2026 Zack Leo · 业余独立设计
                </span>
            </p>
            <div class="footer-links">
                <a href="https://github.com/leo-jan" target="_blank">GitHub</a>
                <span>·</span>
                <a href="mailto:291698522@qq.com">Email</a>
                <span>·</span>
                <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
                    <span data-zh="返回顶部" data-en="Back to Top">返回顶部</span>
                </a>
            </div>
        </footer>

    </div>

    <script>
        let currentLang = 'zh';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            document.querySelectorAll('[data-zh][data-en]').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            document.title = lang === 'zh' ? 'Zack Leo · 作品集' : 'Zack Leo · Portfolio';
            localStorage.setItem('preferred_lang', lang);
        }

        const saved = localStorage.getItem('preferred_lang');
        if (saved === 'zh' || saved === 'en') {
            setLang(saved);
        }

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'l' || e.key === 'L') && !e.ctrlKey && !e.metaKey) {
                setLang(currentLang === 'zh' ? 'en' : 'zh');
                e.preventDefault();
            }
        });

        console.log('🚀 fateglance.cn 已加载！');
        console.log('💡 按 L 键快速切换中英文');
        console.log('📊 日报系统: https://teamomiao.streamlit.app/');
    </script>

</body>
</html>
